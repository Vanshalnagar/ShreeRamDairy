[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "https://shreeramdairy.onrender.com/api/:splat"
  status = 200
  force = true
  headers = {X-Forwarded-Host = ":host", X-Forwarded-Proto = "https"}

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
